<p class="text-on-primary-container text-lg leading-relaxed font-body">
                Access institutional-grade research, asymmetrical market insights, and highly curated financial intelligence.
            </p>
</div>

<div class="w-full lg:w-1/2 flex flex-col justify-center px-6 py-12 sm:px-12 md:px-20 lg:px-24 xl:px-32 bg-surface relative">
<!-- Focused View Exception: Minimal Back Navigation -->
<div class="absolute top-8 left-6 sm:left-12 lg:left-24">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined transition-transform group-hover:-translate-x-1" data-icon="arrow_back" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="font-label text-sm uppercase tracking-[0.05em] font-bold">Return</span>
</a>

<div class="max-w-md w-full mx-auto lg:mx-0 mt-12 lg:mt-0">
<!-- Header -->
<div class="mb-10">
<h1 class="font-headline text-3xl sm:text-4xl font-black tracking-[-0.033em] text-on-surface mb-3">Create your account</h1>
<p class="text-on-surface-variant text-base leading-[1.6]">Join CryptoEdy Research to unlock premium market insights.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2 group">
<label class="font-label text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="email">Email Address</label>
<div class="relative w-full h-14 bg-surface-container-high rounded-xl overflow-hidden transition-colors duration-200 focus-within:bg-surface-container-lowest ghost-border">
<input class="w-full h-full bg-transparent px-4 border-none focus:ring-0 text-on-surface font-body text-base placeholder:text-on-surface-variant/50" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Username Input -->
<div class="flex flex-col gap-2 group">
<label class="font-label text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="username">Username</label>
<div class="relative w-full h-14 bg-surface-container-high rounded-xl overflow-hidden transition-colors duration-200 focus-within:bg-surface-container-lowest ghost-border">
<input class="w-full h-full bg-transparent px-4 border-none focus:ring-0 text-on-surface font-body text-base placeholder:text-on-surface-variant/50" id="username" placeholder="Choose a display name" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2 group">
<label class="font-label text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="password">Password</label>
<div class="relative w-full h-14 bg-surface-container-high rounded-xl overflow-hidden transition-colors duration-200 focus-within:bg-surface-container-lowest ghost-border">
<input class="w-full h-full bg-transparent px-4 border-none focus:ring-0 text-on-surface font-body text-base placeholder:text-on-surface-variant/50" id="password" placeholder="Minimum 8 characters" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-6">
<!-- Primary CTA -->
<button class="w-full h-14 bg-gradient-to-b from-primary to-primary-container text-on-primary rounded-xl font-label text-base font-bold tracking-[0.015em] flex items-center justify-center hover:opacity-95 transition-opacity shadow-sm" type="submit">
                            Sign Up
                        </button>
<!-- Divider -->
<!-- Secondary CTA: Wallet -->
</div>

<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-sm font-body leading-[1.6]">
